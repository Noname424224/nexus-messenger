name: nexus_messenger
description: A beautiful cross-platform messenger for Android & iOS with multiple themes.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  permission_handler: ^11.4.4
  connectivity_plus: ^5.0.1
  shared_preferences: ^2.2.2
  uuid: ^4.0.0
  go_router: ^12.0.0
  flutter_local_notifications: ^16.1.0
  badges: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
